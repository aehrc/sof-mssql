name: Publish to npm

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # SQL Server 2017-2022 only support NVARCHAR(MAX) storage for the
          # resources json column.
          - sql-version: "2017-latest"
            resource-json-data-type: "NVARCHAR(MAX)"
            report-suffix: ""
          - sql-version: "2019-latest"
            resource-json-data-type: "NVARCHAR(MAX)"
            report-suffix: ""
          - sql-version: "2022-latest"
            resource-json-data-type: "NVARCHAR(MAX)"
            report-suffix: ""
          # SQL Server 2025 is exercised against both column types: NVARCHAR(MAX)
          # as a regression guard, and the native JSON type.
          - sql-version: "2025-latest"
            resource-json-data-type: "NVARCHAR(MAX)"
            report-suffix: ""
          - sql-version: "2025-latest"
            resource-json-data-type: "JSON"
            report-suffix: "-json"

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:${{ matrix.sql-version }}
        env:
          SA_PASSWORD: ${{ secrets.SA_PASSWORD }}
          ACCEPT_EULA: Y
        ports:
          - 1433:1433
        options: >-
          --health-cmd "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/1433'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Install SQL Server command-line tools
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          curl https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          echo "/opt/mssql-tools18/bin" >> $GITHUB_PATH

      - name: Create test database
        run: sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -C -Q "CREATE DATABASE testdb"
        env:
          SA_PASSWORD: ${{ secrets.SA_PASSWORD }}

      - name: Run tests
        run: npm run test
        env:
          SQLONFHIR_TEST_PATH: ./sqlonfhir/tests
          MSSQL_HOST: localhost
          MSSQL_DATABASE: testdb
          MSSQL_USER: sa
          MSSQL_PASSWORD: ${{ secrets.SA_PASSWORD }}
          MSSQL_RESOURCE_JSON_DATA_TYPE: ${{ matrix.resource-json-data-type }}

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.sql-version }}${{ matrix.report-suffix }}
          path: out/test-report.json
          retention-days: 30

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    environment: npm
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Publish to npm
        run: npm publish
        continue-on-error: true

  publish-report:
    name: Publish test report to GitHub Pages
    needs: publish
    runs-on: ubuntu-latest
    if: always()
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download all test reports
        uses: actions/download-artifact@v4
        with:
          pattern: test-report-*
          path: test-reports

      - name: Prepare test reports for upload
        run: |
          # The SQL on FHIR conformance dashboard reads this implementation's
          # results from the fixed path `main/test_report_2022-latest.json`, so
          # the report is always published under `main/` regardless of the event
          # that triggered the workflow. A release run's ref is `refs/tags/<tag>`,
          # which previously produced a folder the dashboard could not find.
          REPORT_DIR="main"
          mkdir -p "${REPORT_DIR}"

          # Copy the latest SQL Server version report as the main report.
          cp test-reports/test-report-2022-latest/test-report.json "${REPORT_DIR}/test_report.json"

          # Also copy individual reports for each SQL Server version.
          for version_dir in test-reports/test-report-*/; do
            version=$(basename "${version_dir}" | sed 's/test-report-//')
            cp "${version_dir}/test-report.json" "${REPORT_DIR}/test_report_${version}.json"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
